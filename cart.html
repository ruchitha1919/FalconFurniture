<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shopping Cart - Falcon Furniture</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .cart-page {
            min-height: calc(100vh - 200px);
            padding: 60px 0;
            background-color: #fff;
        }

        .cart-empty-page {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: calc(100vh - 200px);
            text-align: center;
            padding: 60px 20px;
        }

        .cart-empty-page i {
            font-size: 120px;
            color: #ddd;
            margin-bottom: 30px;
        }

        .cart-empty-page h2 {
            font-size: 32px;
            color: #333;
            margin-bottom: 15px;
        }

        .cart-empty-page p {
            font-size: 18px;
            color: #666;
            margin-bottom: 30px;
        }

        .continue-shopping-btn {
            background-color: #8B5E3C;
            color: white;
            border: none;
            padding: 15px 40px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            text-decoration: none;
            display: inline-block;
            transition: all 0.3s;
        }

        .continue-shopping-btn:hover {
            background-color: #A0522D;
            transform: translateY(-2px);
        }

        .cart-content {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 40px;
        }

        .cart-items-section {
            background-color: white;
        }

        .cart-item-card {
            display: flex;
            gap: 20px;
            padding: 25px;
            border: 2px solid #f0f0f0;
            border-radius: 12px;
            margin-bottom: 20px;
            transition: all 0.3s;
        }

        .cart-item-card:hover {
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        .cart-item-image {
            width: 150px;
            height: 150px;
            object-fit: cover;
            border-radius: 10px;
        }

        .cart-item-details {
            flex: 1;
        }

        .cart-item-name {
            font-size: 20px;
            font-weight: 700;
            color: #333;
            margin-bottom: 10px;
        }

        .cart-item-color {
            font-size: 14px;
            color: #666;
            margin-bottom: 15px;
        }

        .cart-item-price {
            font-size: 24px;
            font-weight: 700;
            color: #8B5E3C;
            margin-bottom: 15px;
        }

        .cart-item-actions {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .cart-qty-selector {
            display: flex;
            align-items: center;
            gap: 0;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            overflow: hidden;
        }

        .cart-qty-btn {
            width: 40px;
            height: 40px;
            background-color: white;
            border: none;
            cursor: pointer;
            font-size: 14px;
            color: #8B5E3C;
            transition: all 0.3s;
        }

        .cart-qty-btn:hover {
            background-color: #f8f8f8;
        }

        .cart-qty-input {
            width: 50px;
            height: 40px;
            border: none;
            border-left: 2px solid #e0e0e0;
            border-right: 2px solid #e0e0e0;
            text-align: center;
            font-size: 16px;
            font-weight: 600;
        }

        .remove-item-btn {
            background-color: #fff;
            border: 2px solid #e74c3c;
            color: #e74c3c;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.3s;
        }

        .remove-item-btn:hover {
            background-color: #e74c3c;
            color: white;
        }

        .cart-summary {
            background-color: #f9f9f9;
            padding: 30px;
            border-radius: 12px;
            height: fit-content;
            position: sticky;
            top: 120px;
        }

        .cart-summary h2 {
            font-size: 24px;
            margin-bottom: 25px;
            color: #333;
        }

        .summary-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 16px;
            color: #666;
        }

        .summary-total {
            display: flex;
            justify-content: space-between;
            padding-top: 20px;
            margin-top: 20px;
            border-top: 2px solid #e0e0e0;
            font-size: 22px;
            font-weight: 700;
            color: #333;
        }

        .checkout-btn {
            width: 100%;
            background-color: #8B5E3C;
            color: white;
            border: none;
            padding: 18px;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 25px;
            transition: all 0.3s;
        }

        .checkout-btn:hover {
            background-color: #A0522D;
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(139,94,60,0.3);
        }

        @media (max-width: 992px) {
            .cart-content {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="top-bar">
            <div class="container">
                <div class="top-bar-content">
                    <div class="top-bar-right">
                        <span>Welcome to Falcon Furniture and Interiors!</span>
                    </div>
                </div>
            </div>
        </div>

        <nav class="navbar">
            <div class="container">
                <div class="navbar-content">
                    <div class="logo">
                        <a href="index.html">
                            <img src="https://www.falconfurniture.in/assets/img/logo.svg" alt="Falcon Furniture Logo" class="logo-img">
                        </a>
                    </div>

                    <ul class="nav-menu">
                        <li><a href="index.html">Home</a></li>
                        <li><a href="index.html#about">About</a></li>
                        <li><a href="index.html#products">Products</a></li>
                        <li><a href="#contact">Contact</a></li>
                    </ul>

                    <div class="search-container">
                        <input type="text" class="search-input" placeholder="Search for Sofa...">
                        <button class="search-btn">
                            <i class="fas fa-search"></i>
                        </button>
                    </div>

                    <div class="action-icons">
                        <a href="#" class="icon-link" title="Wishlist">
                            <i class="far fa-heart"></i>
                            <span class="badge" id="wishlistBadge" style="display: none;">0</span>
                        </a>
                        <a href="cart.html" class="icon-link" id="cartIcon" title="Cart">
                            <i class="fas fa-shopping-cart"></i>
                            <span class="badge" id="cartBadge" style="display: none;">0</span>
                        </a>
                        <a href="#" class="icon-link" title="Profile">
                            <i class="far fa-user"></i>
                        </a>
                    </div>
                </div>
            </div>
        </nav>
    </header>

    <section class="cart-page">
        <div class="container">
            <div id="cartContainer"></div>
        </div>
    </section>

    <script src="script.js"></script>
    <script>
        // Load cart from localStorage
        let cart = JSON.parse(localStorage.getItem('falconCart')) || [];

        function updateCartBadge() {
            const cartBadge = document.getElementById('cartBadge');
            if (cartBadge) {
                const totalItems = cart.reduce((sum, item) => sum + item.quantity, 0);
                
                if (totalItems > 0) {
                    cartBadge.textContent = totalItems;
                    cartBadge.style.display = 'flex';
                } else {
                    cartBadge.style.display = 'none';
                }
            }
        }

        function renderCart() {
            const container = document.getElementById('cartContainer');
            
            if (cart.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty-page">
                        <i class="fas fa-shopping-cart"></i>
                        <h2>Your Cart is Empty</h2>
                        <p>No items added to cart</p>
                        <a href="index.html" class="continue-shopping-btn">
                            <i class="fas fa-arrow-left"></i> Continue Shopping
                        </a>
                    </div>
                `;
            } else {
                const subtotal = cart.reduce((sum, item) => {
                    const price = parseInt(item.price.replace(/[₹,]/g, ''));
                    return sum + (price * item.quantity);
                }, 0);

                const shipping = subtotal > 50000 ? 0 : 500;
                const total = subtotal + shipping;

                container.innerHTML = `
                    <h1 style="font-size: 36px; margin-bottom: 40px;">Shopping Cart (${cart.length} items)</h1>
                    <div class="cart-content">
                        <div class="cart-items-section">
                            ${cart.map((item, index) => `
                                <div class="cart-item-card">
                                    <img src="${item.image}" alt="${item.name}" class="cart-item-image">
                                    <div class="cart-item-details">
                                        <div class="cart-item-name">${item.name}</div>
                                        <div class="cart-item-color">Color: ${item.color}</div>
                                        <div class="cart-item-price">${item.price}</div>
                                        <div class="cart-item-actions">
                                            <div class="cart-qty-selector">
                                                <button class="cart-qty-btn" onclick="updateQuantity(${index}, -1)">
                                                    <i class="fas fa-minus"></i>
                                                </button>
                                                <input type="number" class="cart-qty-input" value="${item.quantity}" readonly>
                                                <button class="cart-qty-btn" onclick="updateQuantity(${index}, 1)">
                                                    <i class="fas fa-plus"></i>
                                                </button>
                                            </div>
                                            <button class="remove-item-btn" onclick="removeItem(${index})">
                                                <i class="fas fa-trash"></i> Remove
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="cart-summary">
                            <h2>Order Summary</h2>
                            <div class="summary-row">
                                <span>Subtotal:</span>
                                <span>₹${subtotal.toLocaleString()}</span>
                            </div>
                            <div class="summary-row">
                                <span>Shipping:</span>
                                <span>${shipping === 0 ? 'FREE' : '₹' + shipping}</span>
                            </div>
                            <div class="summary-total">
                                <span>Total:</span>
                                <span>₹${total.toLocaleString()}</span>
                            </div>
                            <button class="checkout-btn" onclick="checkout()">
                                Proceed to Checkout
                            </button>
                        </div>
                    </div>
                `;
            }
        }

        function updateQuantity(index, change) {
            cart[index].quantity += change;
            if (cart[index].quantity < 1) cart[index].quantity = 1;
            if (cart[index].quantity > 10) cart[index].quantity = 10;
            
            localStorage.setItem('falconCart', JSON.stringify(cart));
            updateCartBadge();
            renderCart();
        }

        function removeItem(index) {
            if (confirm('Remove this item from cart?')) {
                cart.splice(index, 1);
                localStorage.setItem('falconCart', JSON.stringify(cart));
                updateCartBadge();
                renderCart();
            }
        }

        function checkout() {
            alert('Proceeding to checkout...');
        }

        // Initialize
        updateCartBadge();
        renderCart();
    </script>
</body>
</html>
